<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Crypto Case</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Paneli</h1>
            <a href="dashboard.html" class="btn">Dashboard</a>
        </header>

        <section>
            <h2>Item Oluştur</h2>
            <form id="createItemForm">
                <div class="form-group">
                    <label for="itemName">Item Adı:</label>
                    <input type="text" id="itemName" required>
                </div>
                <div class="form-group">
                    <label for="itemPrice">Temel Fiyat:</label>
                    <input type="number" id="itemPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="itemWeight">Ağırlık (1-100):</label>
                    <input type="number" id="itemWeight" min="1" max="100" required>
                </div>
                <div class="form-group">
                    <label for="itemPayout">Ödeme Yüzdesi:</label>
                    <input type="number" id="itemPayout" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="itemRarity">Nadirlik:</label>
                    <select id="itemRarity" required>
                        <option value="common">Common</option>
                        <option value="rare">Rare</option>
                        <option value="epic">Epic</option>
                        <option value="legendary">Legendary</option>
                        <option value="mythic">Mythic</option>
                    </select>
                </div>
                <button type="submit" class="btn">Item Oluştur</button>
            </form>
        </section>

        <section>
            <h2>Kasa Oluştur</h2>
            <form id="createCaseForm">
                <div class="form-group">
                    <label for="caseName">Kasa Adı:</label>
                    <input type="text" id="caseName" required>
                </div>
                <div class="form-group">
                    <label for="casePrice">Fiyat:</label>
                    <input type="number" id="casePrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="caseItems">Item ID'leri (virgülle ayır):</label>
                    <input type="text" id="caseItems" placeholder="1,2,3" required>
                </div>
                <button type="submit" class="btn">Kasa Oluştur</button>
            </form>
        </section>

        <section>
            <h2>Tüm Item'lar</h2>
            <div id="itemsList"></div>
        </section>

        <section>
            <h2>Tüm Kasalar</h2>
            <div id="allCasesList"></div>
        </section>

        <section>
            <h2>KullanÄ±cÄ±lar</h2>

            <div id="adminUserDirectory"></div>
        </section>

        <div id="message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
