<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Crypto Case</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kayıt Ol</h1>
        </header>

        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="name">Ä°sim:</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Şifre:</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="adminKey">Admin Anahtarı (isteğe bağlı):</label>
                <input type="password" id="adminKey">
            </div>
            <button type="submit" class="btn">Kayıt Ol</button>
        </form>

        <p>Hesabın var mı? <a href="login.html">Giriş yap</a></p>
        <p><a href="index.html">Ana Sayfa</a></p>

        <div id="message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
