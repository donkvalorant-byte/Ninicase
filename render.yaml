services:
  - type: web
    name: crypto-case
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: DB_PATH
        value: /var/data/app.db
    disk:
      name: crypto-case-data
      mountPath: /var/data
      sizeGB: 1
